services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ".:/app"
    command: go run cmd/api/main.go
    ports:
      - "9000:9000"
    depends_on:
      - postgres

  postgres:
    image: postgres:17

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: jobfinder

    ports:
      - "5432:5432"